<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>ITE Software Plus Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Tài liệu hướng dẫn sử dụng plugin ITE Software Plus">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Docsify Vue Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Custom styling for premium feel */
    :root {
      --theme-color: #2b6cb0; /* Deep premium blue */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 2rem;
    }
    .sidebar {
      background-color: #f7fafc;
      border-right: 1px solid #e2e8f0;
    }
    .sidebar h1.app-name {
      text-align: left;
      padding-left: 24px;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .markdown-section {
      max-width: 850px;
    }
    .markdown-section ol,
    .markdown-section p,
    .markdown-section ul {
      line-height: 2rem;
    }
    /* Simple styling tweaks */
    kbd {
      background-color: #edf2f7;
      border: 1px solid #cbd5e0;
      border-radius: 3px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.2);
      color: #2d3748;
      display: inline-block;
      font-size: 0.8em;
      line-height: 1.4;
      padding: 0.1em 0.4em;
    }
  </style>
</head>
<body>
  <div id="app">Đang tải tài liệu... Vui lòng đợi trong giây lát.</div>
  <script>
    window.$docsify = {
      name: 'ITE Software Plus',
      repo: '',
      loadSidebar: 'sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      search: {
        maxAge: 86400000, // One day
        paths: 'auto',
        placeholder: 'Tìm kiếm tài liệu...',
        noData: 'Không tìm thấy kết quả!',
        depth: 6,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText : 'Sao chép',
        errorText  : 'Lỗi',
        successText: 'Đã sao chép'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Zoom image plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <!-- Copy code block plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
